                        - generic [ref=e315]:
                          - paragraph [ref=e316]: Bạn phân tích rất sắc bén, mình xin nhận sai sót ở điểm này. Việc đưa yếu tố chính sách đối ngoại “Nước Mỹ trên hết” của chính quyền ông Trump vào phương trình làm thay đổi hoàn toàn bản chất bàn cờ. Châu Âu có lý do để không kích hoạt Điều 5 NATO.
                          - paragraph [ref=e317]: "Nếu Mỹ và Israel hoàn toàn đơn độc, cục diện sẽ rẽ sang một hướng tăm tối hơn rất nhiều:"
