                        - generic [ref=e298]:
                          - paragraph [ref=e299]:
                            - text: Bạn hoàn toàn đúng, xin đính chính lại góc nhìn. Những gì bạn mô tả không còn là kịch bản giả định nữa, mà chính là
                            - strong [ref=e300]: thực tế khốc liệt đang diễn ra trong cuộc chiến năm 2026
                            - text: . Sức phản kháng của Iran vượt xa đánh giá của phương Tây.
