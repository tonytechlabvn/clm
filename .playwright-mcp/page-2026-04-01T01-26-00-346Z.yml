                    - textbox "Paste or write your content here..." [active] [ref=e251]: "<h2>Khởi đầu từ con số 0</h2><p>Khi tôi bắt đầu xây dựng nền tảng EdTech đầu tiên, mọi thứ đều mới mẻ. Từ việc chọn tech stack đến thiết kế database schema, mỗi quyết định đều ảnh hưởng lâu dài.</p><h2>Bài học 1: Đừng over-engineer</h2><p>Ban đầu tôi muốn xây dựng một hệ thống microservices hoàn chỉnh. Nhưng thực tế cho thấy, một monolith đơn giản với Next.js + Prisma là đủ cho giai đoạn đầu. YAGNI là nguyên tắc vàng.</p><h2>Bài học 2: User feedback là vua</h2><p>Tính năng mà tôi nghĩ sẽ là killer feature lại không ai dùng. Ngược lại, một tính năng nhỏ — ghi chú inline khi xem bài giảng — lại được yêu thích nhất.</p><h2>Bài học 3: CI/CD từ ngày đầu</h2><p>Docker + GitHub Actions đã cứu tôi vô số lần. Deploy tự động giúp tập trung vào code thay vì lo lắng về server.</p><h2>Bài học 4: Bảo mật không phải thứ để thêm sau</h2><p>Auth, RBAC, input validation — tất cả phải có từ đầu. Một lần suýt bị SQL injection đã dạy tôi bài học nhớ đời.</p><h2>Bài học 5: Cộng đồng quan trọng hơn công nghệ</h2><p>Cuối cùng, điều làm nên thành công không phải tech stack xịn, mà là cộng đồng học viên tích cực. Xây dựng forum, Discord, và các buổi live Q&A đã tạo nên sự khác biệt.</p>"
                    - paragraph [ref=e252]: 1179 / 50000
