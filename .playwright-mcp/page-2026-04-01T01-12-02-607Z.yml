                              - strong [ref=e310]: "Quyền lực Hành lang:"
                              - text: Các nhóm như AIPAC tạo sức ép khổng lồ khiến việc ủng hộ Israel trở thành bài kiểm tra sinh tử cho chính trị gia Mỹ.
                            - listitem [ref=e311]:
                              - strong [ref=e312]: "Chiến lược Chia để trị:"
                              - text: Một thế giới Ả Rập thống nhất là mối đe dọa sinh tồn. Israel cần duy trì sự phân tâm (Sunni đối đầu Shia) để làm suy yếu các vùng đệm xung quanh.
                            - listitem [ref=e313]:
                              - strong [ref=e314]: "Mở rộng sau chiến tranh:"
                              - text: Lịch sử đã chứng minh sau các cuộc chiến, Israel thường mở rộng kiểm soát lãnh thổ và kích thích cực mạnh ngành công nghiệp quốc phòng.
                          - paragraph [ref=e315]:
                            - strong [ref=e316]: "Góc nhìn đa chiều:"
                            - text: Dù công nghiệp vũ khí hưởng lợi, một cuộc chiến tranh tổng lực thực chất lại tàn phá nền kinh tế vĩ mô của Israel (lao động ra tiền tuyến, vốn tháo chạy). Họ muốn một Trung Đông “cháy âm ỉ” chứ không phải một ngọn lửa thiêu rụi chính họ.
