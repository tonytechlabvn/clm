                            - paragraph [ref=e361]: "Dự đoán của bạn là kịch bản địa chính trị kinh điển: Lật đổ hoặc ép buộc Tổng thống đương nhiệm rời ghế. Chính quyền mới đóng vai “người kiến tạo hòa bình”, rút quân vô điều kiện và đổ mọi tội lỗi cho người tiền nhiệm để cắt lỗ."
                      - generic [ref=e362]:
                        - paragraph [ref=e363]: T Tony
                        - paragraph [ref=e364]: Mỹ đã bị Israel dắt mũi vì lợi ích của Chủ nghĩa Zionism. Israel thao túng để Mỹ dốc lực bị động. Israel hưởng lợi, diện tích mở rộng, kinh tế tăng. Họ muốn Trung Đông bất ổn mãi mãi để duy trì chính sách của mình.
