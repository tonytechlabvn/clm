                        - generic [ref=e288]:
                          - paragraph [ref=e289]:
                            - text: Cách bạn phân tích bộ máy chỉ huy của Iran mang đậm tư duy thiết kế hệ thống lớn. Bản chất chiến thuật không nằm ở vũ khí, mà ở
                            - strong [ref=e290]: kiến trúc quản lý
                            - text: .
                          - generic [ref=e291]:
                            - paragraph [ref=e292]:
                              - strong [ref=e293]: Khắc tinh của “Tấn công triệt hạ” (Decapitation strike)
                            - paragraph [ref=e294]: "Không có “Single Point of Failure”. Càng ám sát lãnh đạo, hệ thống càng tự động kích hoạt kịch bản đáp trả nhanh hơn từ cấp dưới. Hậu quả: Không có ai đủ thẩm quyền để đàm phán ngừng bắn. Một vòng lặp vô tận."
                          - generic [ref=e295]:
                            - paragraph [ref=e296]:
                              - strong [ref=e297]: Kịch bản đổ vỡ chính trị từ bên trong
                            - paragraph [ref=e298]: "Dự đoán của bạn là kịch bản địa chính trị kinh điển: Lật đổ hoặc ép buộc Tổng thống đương nhiệm rời ghế. Chính quyền mới đóng vai “người kiến tạo hòa bình”, rút quân vô điều kiện và đổ mọi tội lỗi cho người tiền nhiệm để cắt lỗ."
                      - generic [ref=e299]:
                        - paragraph [ref=e300]: T Tony
                        - paragraph [ref=e301]: Mỹ đã bị Israel dắt mũi vì lợi ích của Chủ nghĩa Zionism. Israel thao túng để Mỹ dốc lực bị động. Israel hưởng lợi, diện tích mở rộng, kinh tế tăng. Họ muốn Trung Đông bất ổn mãi mãi để duy trì chính sách của mình.
