volumes:
  clm-pgdata:
  openzca-data:

networks:
  tony-net:
    external: true
    name: tony-net

services:
  clm-db:
    image: postgres:16-alpine
    container_name: clm-db
    restart: always
    environment:
      - POSTGRES_USER=clm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=clm
    volumes:
      - clm-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - tony-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clm"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  clm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXTAUTH_URL=${NEXTAUTH_URL}
    container_name: clm.tonytechlab.com
    restart: always
    depends_on:
      clm-db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://clm:${POSTGRES_PASSWORD}@clm-db:5432/clm?schema=public&connection_limit=5&pool_timeout=10
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WP_OAUTH_CLIENT_ID=${WP_OAUTH_CLIENT_ID}
      - WP_OAUTH_CLIENT_SECRET=${WP_OAUTH_CLIENT_SECRET}
      - WP_OAUTH_AUTHORIZE_URL=${WP_OAUTH_AUTHORIZE_URL}
      - WP_OAUTH_TOKEN_URL=${WP_OAUTH_TOKEN_URL}
      - WP_OAUTH_USERINFO_URL=${WP_OAUTH_USERINFO_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CMA_ENCRYPTION_KEY=${CMA_ENCRYPTION_KEY}
      - ENABLE_API_KEY_AUTH=${ENABLE_API_KEY_AUTH:-true}
      # Cap Node.js heap to 512MB — prevents runaway AI responses from consuming all server RAM
      - NODE_OPTIONS=--max-old-space-size=512
    ports:
      - "3001:3000"
    networks:
      - tony-net
    # Docker-level resource limits — hard ceiling so a stuck process can't take down the host
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--timeout=5", "http://0.0.0.0:3000/api/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # OpenZCA — Zalo personal bot sidecar (forwards messages to CLM webhook)
  # First-time setup: docker compose exec openzca openzca auth login
  # Then restart: docker compose restart openzca
  openzca:
    image: node:22-alpine
    container_name: clm-openzca
    restart: unless-stopped
    working_dir: /home/node
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - |
        apk add --no-cache curl 2>/dev/null
        # Install xdg-open stub to prevent crash when generating QR
        printf '#!/bin/sh\nexit 0\n' > /usr/local/bin/xdg-open && chmod +x /usr/local/bin/xdg-open
        # Use npx for fresh openzca install (global npm install broken on Node 22)
        su -s /bin/sh node -c "npx openzca@latest --help" > /dev/null 2>&1
        mkdir -p /home/node/.openzca
        chown -R node:node /home/node/.openzca
        rm -f /home/node/.openzca/profiles/default/listener-owner.json 2>/dev/null
        # Clean up old inbound media files every hour (keep 7 days)
        (while true; do find /home/node/.openzca -path '*/inbound/*' -type f -mtime +7 -delete 2>/dev/null; sleep 3600; done) &
        if [ -f /home/node/.openzca/profiles.json ]; then
          echo "[openzca] Credentials found, starting listener..."
          su -s /bin/sh node -c "npx openzca@latest listen --keep-alive --raw 2>&1 | node /home/node/webhook-pipe.mjs"
        else
          echo "[openzca] No credentials found. Use CLM settings UI to login."
          sleep infinity
        fi
    volumes:
      - openzca-data:/home/node/.openzca
      - ./scripts/openzca-webhook-pipe.mjs:/home/node/webhook-pipe.mjs:ro
    networks:
      - tony-net
    depends_on:
      - clm
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
