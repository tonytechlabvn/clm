                    - 'heading "Chương 2: Cám Dỗ Của “Lỗ Hổng” Policy" [level=2] [ref=e680]'
                    - paragraph [ref=e681]: "Khi khái niệm “10 người bạn” được xác lập, tư duy của một dân kỹ thuật trong tôi nảy số ngay lập tức. Tôi hỏi A.I một câu mà có lẽ Google không thích lắm:"
                    - generic [ref=e682]:
                      - paragraph [ref=e683]: 👨‍💻 Tony
                      - paragraph [ref=e684]: “Vậy nếu Google có chính sách mời 10 người bạn tham gia để nhận thưởng, tôi mời 10 phiên bản của chính mình thì có được không?”
                    - paragraph [ref=e685]: Ban đầu, đó là một ý định tìm kiếm lợi ích ngắn hạn. Một chút “lách luật” dựa trên câu chữ. Gemini đã phản biện rất gắt về mặt đạo đức xã hội và chính sách người dùng thực.
                    - 'heading "Chương 3: Cuộc Tranh Biện Về Logic Kinh Doanh" [level=2] [ref=e686]'
                    - paragraph [ref=e687]: "Không chấp nhận câu trả lời khuôn mẫu, tôi đưa ra lập luận của một người làm hệ thống (System Thinking):"
