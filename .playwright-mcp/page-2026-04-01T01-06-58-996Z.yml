                              - paragraph [ref=e286]: Nguy cơ Mỹ sử dụng đến vũ khí hạt nhân chiến thuật hoặc chiến lược là cực kỳ cao. Học thuyết “Đảm bảo hủy diệt lẫn nhau” (MAD) sẽ chính thức bị kích hoạt.
                            - generic [ref=e287]:
                              - paragraph [ref=e288]:
                                - strong [ref=e289]: 3. Sụp đổ kinh tế toàn cầu
                              - paragraph [ref=e290]: Huyết mạch eo biển Hormuz tê liệt, giá năng lượng tăng phi mã dẫn đến sự sụp đổ tồi tệ nhất của thị trường tài chính hiện đại.
                          - paragraph [ref=e291]:
                            - strong [ref=e292]: "Thực tế hiện tại:"
                            - text: Các chuyên gia đánh giá Nga, Trung ưu tiên chiến tranh ủy nhiệm hơn đối đầu trực tiếp. Kịch bản bạn nêu là viễn cảnh tồi tệ nhất, vì cái giá phải trả chính là sự tồn vong của chính quốc gia mình.
