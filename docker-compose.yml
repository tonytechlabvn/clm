volumes:
  clm-pgdata:

networks:
  tony-net:
    external: true
    name: tony-net

services:
  clm-db:
    image: postgres:16-alpine
    container_name: clm-db
    restart: always
    environment:
      - POSTGRES_USER=clm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=clm
    volumes:
      - clm-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - tony-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clm"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  clm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXTAUTH_URL=${NEXTAUTH_URL}
    container_name: clm.tonytechlab.com
    restart: always
    depends_on:
      clm-db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://clm:${POSTGRES_PASSWORD}@clm-db:5432/clm?schema=public&connection_limit=5&pool_timeout=10
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WP_OAUTH_CLIENT_ID=${WP_OAUTH_CLIENT_ID}
      - WP_OAUTH_CLIENT_SECRET=${WP_OAUTH_CLIENT_SECRET}
      - WP_OAUTH_AUTHORIZE_URL=${WP_OAUTH_AUTHORIZE_URL}
      - WP_OAUTH_TOKEN_URL=${WP_OAUTH_TOKEN_URL}
      - WP_OAUTH_USERINFO_URL=${WP_OAUTH_USERINFO_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CMA_ENCRYPTION_KEY=${CMA_ENCRYPTION_KEY}
      # Cap Node.js heap to 512MB — prevents runaway AI responses from consuming all server RAM
      - NODE_OPTIONS=--max-old-space-size=512
    ports:
      - "3001:3000"
    networks:
      - tony-net
    # Docker-level resource limits — hard ceiling so a stuck process can't take down the host
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--timeout=5", "http://0.0.0.0:3000/api/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
