                        - paragraph [ref=e295]: Thì ko phải hiện tại như vậy sao. Eo biển bị Iran khóa dầu tăng lên hơn 100 đô. Houthi tham gia đòi khóa biển đỏ… Iran trả đũa bằng cách xóa sổ hạ tầng đồng minh Mỹ. Càng đánh Iran càng hay!
